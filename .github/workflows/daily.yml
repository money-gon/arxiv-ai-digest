name: daily arXiv summary

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = JST 07:00
  workflow_dispatch: {}  # 手動実行

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push に必要
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main  # 常に main ブランチで実行

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run summary
        run: python main.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Commit and push DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers_db.json
          git diff --staged --quiet || git commit -m "Update papers_db.json"
          git push origin HEAD:main
