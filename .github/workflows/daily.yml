name: daily arXiv summary

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = JST 07:00
  workflow_dispatch: {}  # 手動実行

# 同時実行を防ぐ（前のジョブが完了するまで新しいジョブを待機させる）
concurrency:
  group: arxiv-summary
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # HF API ハングアップ対策
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main  # 常に main ブランチで実行

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate summaries
        run: python main.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add papers_db.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update arXiv digest $(date -u +'%Y-%m-%d')"
            git push
          fi

